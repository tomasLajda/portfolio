<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,300;0,400;0,500;1,300&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/main.css" />
    <title>Tomáš Lajda - contact.</title>
    <link rel="icon" href="img/logo_trans_white.png" />
  </head>
  <body>
    <header class="mainHeader">
      <div>
        <img src="img/logo_trans_white.png" alt="" id="logo" />
        <ul>
          <li><a href="home.html">home.</a></li>
          <li><a href="work.html">work.</a></li>
          <li><a href="me.html">me.</a></li>
          <li id="active"><a href="#">contact.</a></li>
        </ul>
        <a href="https://github.com/heppiex" target="_blank"
          ><img src="img/github_white_trans.png" alt="" id="github"
        /></a>
      </div>
    </header>
    <main class="contact">
      <div class="container"">
        <div class="formContainer">
          <form action="" class="contactForm">
            <h1>Contact</h1>
            <div>
              <input type="text" id="name" placeholder="Full name">
              <input type="email" id="email" placeholder="Email">
              <input type="test" id="subject" placeholder="Subject">
              <textarea id="message" placeholder="Message" cols="30" rows="10"></textarea>
              <input type="submit" class="submit" value="Send Message">
            </div>
          </form>
        </div>
        <div class="socialMedia">
          <h1>social media</h1>
          <div>
            <a href="https://github.com/heppiex" target="_blank"><img src="img/github_white_trans.png" alt=""></a>
            <p>Some of my work is there. Follow me there to see more of my future work.</p>
          </div>
          <div>
            <a href="https://www.instagram.com/tomas.lajda/?hl=sk" target="_blank"><img src="img/inst_white.png" alt=""></a>
            <p>You can follow me on instagram if you want. But I don't have anything there.</p>
          </div>
        </div>
      </div>
    </main>
    <script src="js/contactApp.js"></script>
  </body>
</html>
